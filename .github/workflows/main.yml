name: Build Native Webview APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false

jobs:
  build-and-compile:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Modern React Native App
        run: |
          echo "Initializing App..."
          npx @react-native-community/cli@latest init WebApp --skip-install > rn_init.log 2>&1 || { cat rn_init.log; exit 1; }
          
      - name: Install Dependencies & Webview
        run: |
          cd WebApp
          npm install > npm_install.log 2>&1 || { cat npm_install.log; exit 1; }
          npm install react-native-webview > npm_webview.log 2>&1 || { cat npm_webview.log; exit 1; }

      - name: Inject Production Webview Code
        run: |
          cd WebApp
          cat << 'EOF' > App.tsx
          import React, { useRef, useEffect, useState } from 'react';
          import { SafeAreaView, StatusBar, BackHandler, StyleSheet, ActivityIndicator, View } from 'react-native';
          import { WebView } from 'react-native-webview';

          const TARGET_URL = 'https://aistudio.xiaomimimo.com/#/c';

          const App = () => {
            const webViewRef = useRef<WebView>(null);
            const [canGoBack, setCanGoBack] = useState(false);

            // Handle Android Hardware Back Button for Native Feel
            useEffect(() => {
              const backAction = () => {
                if (canGoBack && webViewRef.current) {
                  webViewRef.current.goBack();
                  return true; // Prevent default behavior (exiting app)
                }
                return false; // Exit app if no history
              };

              const backHandler = BackHandler.addEventListener('hardwareBackPress', backAction);
              return () => backHandler.remove();
            }, [canGoBack]);

            const LoadingIndicatorView = () => (
              <View style={styles.loaderContainer}>
                <ActivityIndicator color="#0000ff" size="large" />
              </View>
            );

            return (
              <SafeAreaView style={styles.container}>
                <StatusBar barStyle="dark-content" backgroundColor="#ffffff" />
                <WebView
                  ref={webViewRef}
                  source={{ uri: TARGET_URL }}
                  style={styles.webview}
                  onNavigationStateChange={(navState) => setCanGoBack(navState.canGoBack)}
                  renderLoading={LoadingIndicatorView}
                  startInLoadingState={true}
                  javaScriptEnabled={true}
                  domStorageEnabled={true}
                  bounces={false} // Prevents iOS over-scroll
                  overScrollMode="never" // Prevents Android over-scroll
                  pullToRefreshEnabled={true}
                />
              </SafeAreaView>
            );
          };

          const styles = StyleSheet.create({
            container: { flex: 1, backgroundColor: '#ffffff' },
            webview: { flex: 1 },
            loaderContainer: { position: 'absolute', top: 0, left: 0, right: 0, bottom: 0, justifyContent: 'center', alignItems: 'center', backgroundColor: '#ffffff' }
          });

          export default App;
          EOF

      - name: Bundle JavaScript Assets (Fixes "Unable to load script" Error)
        run: |
          cd WebApp
          mkdir -p android/app/src/main/assets
          echo "Bundling JavaScript..."
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res > bundle.log 2>&1 || { cat bundle.log; exit 1; }

      - name: Build Android Standalone Debug APK
        run: |
          cd WebApp/android
          chmod +x gradlew
          echo "Building Standalone APK..."
          ./gradlew assembleDebug -q --console=plain --no-daemon > gradle_build.log 2>&1 || { cat gradle_build.log; exit 1; }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Native-Webview-APK
          path: WebApp/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
